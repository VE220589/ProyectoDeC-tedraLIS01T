apiVersion: v1
kind: ConfigMap
metadata:
  name: tmnotes-config
  namespace: tmnotes
data:
  CI_ENVIRONMENT: production
  APP_BASE_URL: http://localhost/
  app.baseURL: http://localhost/
  app.sessionInactivityTimeout: "1800"
  DB_HOST: postgres
  DB_NAME: tmnotes
  DB_USER: postgres
  DB_PORT: "5432"
  database.default.hostname: postgres
  database.default.database: tmnotes
  database.default.username: postgres
  database.default.port: "5432"
  GOOGLE_CLIENT_ID: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tmnotes-app
  namespace: tmnotes
spec:
  replicas: 2
  selector:
    matchLabels:
      app: tmnotes-app
  template:
    metadata:
      labels:
        app: tmnotes-app
    spec:
      containers:
        - name: app
          image: tmnotes-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: tmnotes-config
          env:
            - name: database.default.password
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: writable
              mountPath: /var/www/html/writable
      volumes:
        - name: writable
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tmnotes-app
  namespace: tmnotes
spec:
  type: NodePort
  selector:
    app: tmnotes-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
