apiVersion: v1
kind: ConfigMap
metadata:
  name: tmnotes-config
  namespace: tmnotes
data:
  # Configuracion no sensible de la aplicacion.
  CI_ENVIRONMENT: production
  APP_BASE_URL: http://localhost:30080/
  app.baseURL: http://localhost:30080/
  app.sessionInactivityTimeout: "1800"
  DB_HOST: postgres
  DB_NAME: tmnotes
  DB_USER: postgres
  DB_PORT: "5432"
  database.default.hostname: postgres
  database.default.database: tmnotes
  database.default.username: postgres
  database.default.port: "5432"
  GOOGLE_CLIENT_ID: ""
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: tmnotes-app
  namespace: tmnotes
spec:
  # Dos replicas demuestran escalabilidad horizontal y tolerancia basica a fallos.
  replicas: 2
  selector:
    matchLabels:
      app: tmnotes-app
  template:
    metadata:
      labels:
        app: tmnotes-app
    spec:
      initContainers:
        - name: prepare-writable
          image: busybox:1.36
          command:
            - sh
            - -c
            - >
              mkdir -p /writable/cache /writable/debugbar /writable/logs /writable/session /writable/uploads
              && chown -R 33:33 /writable
              && chmod -R 775 /writable
          volumeMounts:
            - name: writable
              mountPath: /writable
      containers:
        - name: app
          # Imagen local construida con: docker build -t tmnotes-app:latest .
          image: tmnotes-app:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          envFrom:
            - configMapRef:
                name: tmnotes-config
          env:
            # La clave de la BD se toma desde Secret, no desde ConfigMap.
            - name: database.default.password
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: POSTGRES_PASSWORD
          readinessProbe:
            # Kubernetes solo envia trafico cuando la app responde.
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            # Si la app deja de responder, Kubernetes reinicia el contenedor.
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            # Directorio writable de CodeIgniter para logs/cache/sesiones.
            - name: writable
              mountPath: /var/www/html/writable
      volumes:
        - name: writable
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: tmnotes-app
  namespace: tmnotes
spec:
  # NodePort expone la app en localhost:30080 cuando se usa Docker Desktop Kubernetes.
  type: NodePort
  selector:
    app: tmnotes-app
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
